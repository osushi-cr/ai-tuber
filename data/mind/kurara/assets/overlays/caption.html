<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Kurara Caption Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Kosugi+Maru:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:        #FFC0CB;
    --pink-deep:   #FF6F91;
    --pink-soft:   #FFE4EC;
    --purple:      #C8A2D9;
    --purple-deep: #9D6FB8;
    --bg-card:     #FFFAFC;
    --text-main:   #5B3A4A;
    --shadow-pink: 0 6px 24px rgba(255, 111, 145, 0.35);
    --shadow-purple: 0 6px 24px rgba(157, 111, 184, 0.35);
    --radius:      28px;
    --font-pop:    "Mochiy Pop One", "Kosugi Maru", sans-serif;
    --font-round:  "Kosugi Maru", "Mochiy Pop One", sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: var(--font-round);
  }

  #root {
    position: absolute;
    inset: 0;
    display: flex;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  #root.shown { opacity: 1; }

  /* 装飾共通 */
  .card {
    position: relative;
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-pink);
    padding: 24px 36px;
    max-width: 78vw;
    color: var(--text-main);
    border: 4px solid var(--pink);
  }
  .card::before {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: calc(var(--radius) + 8px);
    border: 3px dashed var(--pink-soft);
    pointer-events: none;
  }
  .ribbon {
    position: absolute;
    top: -22px; left: 24px;
    background: var(--pink-deep);
    color: white;
    font-family: var(--font-pop);
    font-size: 20px;
    padding: 4px 16px;
    border-radius: 14px;
    box-shadow: var(--shadow-pink);
    letter-spacing: 0.05em;
  }

  .title {
    font-family: var(--font-pop);
    color: var(--pink-deep);
    margin: 0;
    line-height: 1.3;
  }
  .summary {
    margin-top: 12px;
    font-size: 24px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* === type: news（右下テロップ。 左半身のくらら立ち絵と被らないよう右寄せ） === */
  #root.type-news {
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0 60px 80px 0;
  }
  #root.type-news .card {
    border-color: var(--pink);
    box-shadow: var(--shadow-pink);
    max-width: 56vw;
  }
  #root.type-news .ribbon { background: var(--pink-deep); }
  #root.type-news .title { font-size: 30px; }

  /* === type: comment（コメント反応中、 右下バブル風。 2 倍スケール） === */
  #root.type-comment {
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0 60px 80px 0;
  }
  #root.type-comment .card {
    border-color: var(--purple);
    box-shadow: var(--shadow-purple);
    background: linear-gradient(135deg, var(--bg-card), #FAF0FF);
    padding: 48px 72px;
    max-width: 70vw;
  }
  #root.type-comment .card::before {
    border-color: #EBD9F5;
  }
  #root.type-comment .ribbon {
    background: var(--purple-deep);
    box-shadow: var(--shadow-purple);
    font-size: 36px;
    padding: 8px 28px;
    top: -36px;
    left: 32px;
  }
  #root.type-comment .title {
    color: var(--purple-deep);
    font-size: 56px;
  }
  #root.type-comment .summary {
    font-size: 44px;
    line-height: 1.5;
    margin-top: 20px;
  }

  /* === type: intro（中央大表示） === */
  #root.type-intro {
    align-items: center;
    justify-content: center;
  }
  #root.type-intro .card {
    padding: 36px 64px;
    border-width: 6px;
  }
  #root.type-intro .title {
    font-size: 64px;
    color: var(--pink-deep);
    text-shadow: 4px 4px 0 var(--purple);
  }

  /* === type: closing（中央巨大「おしまい」） === */
  #root.type-closing {
    align-items: center;
    justify-content: center;
  }
  #root.type-closing .card {
    padding: 48px 96px;
    border-width: 8px;
    border-color: var(--purple);
    background: var(--pink-soft);
  }
  #root.type-closing .title {
    font-size: 96px;
    color: var(--purple-deep);
    text-shadow: 5px 5px 0 var(--pink);
  }

  /* シャボン玉装飾 */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, white, var(--pink-soft));
    opacity: 0.7;
    pointer-events: none;
  }
  .b1 { top: 12%; left: 8%;  width: 60px; height: 60px; }
  .b2 { top: 22%; right: 12%; width: 40px; height: 40px; }
  .b3 { bottom: 18%; left: 14%; width: 30px; height: 30px; }
  .b4 { bottom: 10%; right: 6%; width: 50px; height: 50px; }
  #root.type-intro .bubble,
  #root.type-closing .bubble { display: block; }
  #root .bubble { display: none; }
</style>
</head>
<body>
  <div id="root">
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div id="card" class="card">
      <div id="ribbon" class="ribbon"></div>
      <h1 id="title" class="title"></h1>
      <div id="summary" class="summary"></div>
    </div>
  </div>

  <script>
    const RIBBON_BY_TYPE = {
      news: "📰 NEWS",
      comment: "💬 コメント",
      intro: "✨ START",
      closing: "🌙 END",
    };

    const API = (location.search.match(/[?&]api=([^&]+)/) || [])[1]
      || "http://localhost:8000/api/caption/state";

    const root = document.getElementById("root");
    const titleEl = document.getElementById("title");
    const summaryEl = document.getElementById("summary");
    const ribbonEl = document.getElementById("ribbon");

    let lastSig = "";

    function setType(type) {
      const types = ["news", "comment", "intro", "closing"];
      types.forEach(t => root.classList.remove("type-" + t));
      if (type) root.classList.add("type-" + type);
    }

    function render(data) {
      const sig = JSON.stringify(data);
      if (sig === lastSig) return;
      lastSig = sig;

      if (!data || !data.visible || !data.type) {
        root.classList.remove("shown");
        return;
      }

      setType(data.type);
      titleEl.textContent = data.title || "";
      summaryEl.textContent = data.summary || "";
      ribbonEl.textContent = RIBBON_BY_TYPE[data.type] || "";

      // intro / closing は title のみ強調表示し、 summary 領域は隠す
      if (data.type === "intro" || data.type === "closing") {
        summaryEl.style.display = "none";
        ribbonEl.style.display = "none";
      } else {
        summaryEl.style.display = "";
        ribbonEl.style.display = "";
      }

      root.classList.add("shown");
    }

    async function poll() {
      try {
        const res = await fetch(API + "?_t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        render(data);
      } catch (e) {
        // body-streamer が落ちた等は無視（次回ポーリングで自動復帰）
      }
    }

    setInterval(poll, 1000);
    poll();
  </script>
</body>
</html>
